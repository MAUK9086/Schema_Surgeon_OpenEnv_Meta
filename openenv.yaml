spec_version: 1
name: schema-surgeon
version: "1.0.0"
type: space
runtime: fastapi
app: server.app:app
port: 7860
description: >
  An RL environment where an agent acts as an autonomous Database Reliability
  Engineer, applying global transformations to migrate a messy NoSQL collection
  toward a strict JSON Schema target.
author: Team PARADOX
tasks:
  - id: task1
    name: The Standardizer
    difficulty: easy
    score_range: [0.001, 0.999]
    data_file: server/data/task1.json
    max_steps: 30
    description: Normalize id key drift in realistic e-commerce user records.
    target_schema:
      type: object
      required: [user_id, contact_info, purchase_history]
      properties:
        user_id:
          type: string
        contact_info:
          type: object
          required: [email, phone]
          properties:
            email:
              type: string
            phone:
              type: string
          additionalProperties: true
        purchase_history:
          type: array
          items:
            type: object
            required: [item, cost]
            properties:
              item:
                type: string
              cost:
                type: number
            additionalProperties: true
      additionalProperties: true
  - id: task2
    name: The Type-Checker
    difficulty: medium
    score_range: [0.001, 0.999]
    data_file: server/data/task2.json
    max_steps: 30
    description: Fix root-level type drift while preserving nested realistic structures.
    target_schema:
      type: object
      required: [user_id, age, lifetime_value, contact_info, purchase_history]
      properties:
        user_id:
          type: string
        age:
          type: integer
        lifetime_value:
          type: number
        contact_info:
          type: object
          required: [email, phone]
          properties:
            email:
              type: string
            phone:
              type: string
          additionalProperties: true
        purchase_history:
          type: array
          items:
            type: object
            required: [item, cost]
            properties:
              item:
                type: string
              cost:
                type: number
            additionalProperties: true
      additionalProperties: true
  - id: task3
    name: The Full Architect
    difficulty: hard
    score_range: [0.001, 0.999]
    data_file: server/data/task3.json
    max_steps: 30
    description: Resolve key drift, type drift, and flatten profile.tier to tier.
    target_schema:
      type: object
      required: [user_id, age, lifetime_value, tier, contact_info, purchase_history]
      properties:
        user_id:
          type: string
        age:
          type: integer
        lifetime_value:
          type: number
        tier:
          type: string
        contact_info:
          type: object
          required: [email, phone]
          properties:
            email:
              type: string
            phone:
              type: string
          additionalProperties: true
        purchase_history:
          type: array
          items:
            type: object
            required: [item, cost]
            properties:
              item:
                type: string
              cost:
                type: number
            additionalProperties: true
      additionalProperties: true
api:
  protocol: websocket
  endpoint: /ws